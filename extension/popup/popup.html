<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Sniffer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="logo">
          <img src="../icons/icon16.png" alt="Shopify Review Sniffer" />
          <span>Shopify Review Sniffer</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="addBtn" title="Add scrape" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16" fill="#0a5c3b">
              <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
              <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
            </svg>
          </button>
          <button class="icon-btn" id="settingsToggle" title="Settings">
            <svg viewBox="0 0 30.00 30.00" width="15" height="15"  id="Layer_1" version="1.1" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="#008060" stroke="#000000" stroke-width="0.00030000000000000003"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" stroke="#CCCCCC" stroke-width="0.48"></g><g id="SVGRepo_iconCarrier"><style type="text/css"> .st0{fill:#FD6A7E;} .st1{fill:#008060;} .st2{fill:#008060;} .st3{fill:#41A6F9;} .st4{fill:#37E0FF;} .st5{fill:#2FD9B9;} .st6{fill:#F498BD;} .st7{fill:#FFDF1D;} .st8{fill:#C6C9CC;} </style><path class="st2" d="M26.6,12.9l-2.9-0.3c-0.2-0.7-0.5-1.4-0.8-2l1.8-2.3c0.2-0.2,0.1-0.5,0-0.7l-2.2-2.2c-0.2-0.2-0.5-0.2-0.7,0 l-2.3,1.8c-0.6-0.4-1.3-0.6-2-0.8l-0.3-2.9C17,3.2,16.8,3,16.6,3h-3.1c-0.3,0-0.5,0.2-0.5,0.4l-0.3,2.9c-0.7,0.2-1.4,0.5-2,0.8 L8.3,5.4c-0.2-0.2-0.5-0.1-0.7,0L5.4,7.6c-0.2,0.2-0.2,0.5,0,0.7l1.8,2.3c-0.4,0.6-0.6,1.3-0.8,2l-2.9,0.3C3.2,13,3,13.2,3,13.4v3.1 c0,0.3,0.2,0.5,0.4,0.5l2.9,0.3c0.2,0.7,0.5,1.4,0.8,2l-1.8,2.3c-0.2,0.2-0.1,0.5,0,0.7l2.2,2.2c0.2,0.2,0.5,0.2,0.7,0l2.3-1.8 c0.6,0.4,1.3,0.6,2,0.8l0.3,2.9c0,0.3,0.2,0.4,0.5,0.4h3.1c0.3,0,0.5-0.2,0.5-0.4l0.3-2.9c0.7-0.2,1.4-0.5,2-0.8l2.3,1.8 c0.2,0.2,0.5,0.1,0.7,0l2.2-2.2c0.2-0.2,0.2-0.5,0-0.7l-1.8-2.3c0.4-0.6,0.6-1.3,0.8-2l2.9-0.3c0.3,0,0.4-0.2,0.4-0.5v-3.1 C27,13.2,26.8,13,26.6,12.9z M15,19c-2.2,0-4-1.8-4-4c0-2.2,1.8-4,4-4s4,1.8,4,4C19,17.2,17.2,19,15,19z"></path></g></svg>  
          </button>
        </div>
      </header>

      <!-- Settings Panel -->
      <div class="panel hidden" id="settingsPanel">
        <div class="field">
          <label>Auto-delete after export (minutes, 0 = never)</label>
          <input type="number" id="autoDeleteInput" min="0" max="60" value="5" />
        </div>
        <button class="btn btn-sm btn-primary" id="saveSettings">Save</button>
      </div>

      <!-- Add Scrape Panel -->
      <div class="panel hidden" id="addPanel">
        <div class="add-app-name" id="addAppName"></div>
        <div class="field">
          <label>Keyword filter (leave empty for all reviews)</label>
          <input type="text" id="keywordInput" placeholder="e.g. amazing, support..." autocomplete="off" />
        </div>
        <div class="panel-actions">
          <button class="btn btn-primary" id="startBtn">Start</button>
          <button class="btn btn-ghost" id="cancelAdd">Cancel</button>
        </div>
      </div>

      <!-- Process List -->
      <div class="section-label">Processes</div>
      <div id="processList" class="process-list">
        <div class="empty-state">Navigate to a Shopify app page and click + to start.</div>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
